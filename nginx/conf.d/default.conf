# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name aqua-api-main.multilingualai.com www.aqua-api-main.multilingualai.com;

    # ACME HTTP-01 challenge for Let's Encrypt. certbot (the compose `certbot`
    # service) writes challenge files to the shared /var/www/certbot volume;
    # this location must be served over plain HTTP and must take precedence
    # over the HTTPS redirect below, so it stays a separate `location`.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aqua-api-main.multilingualai.com www.aqua-api-main.multilingualai.com;

    # SSL Configuration (managed by Certbot in droplet)
    ssl_certificate /etc/letsencrypt/live/aqua-api-main.multilingualai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aqua-api-main.multilingualai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2G;

    # nginx drops underscore-named headers by default. Enable so headers like
    # `info_test` survive the proxy. The app reads the hyphenated forms, so a
    # spoofed underscore variant does not collide with what it reads.
    underscores_in_headers on;

    # API Backend
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Node Exporter Metrics (protected with auth)
    location /metrics {
        auth_basic "Metrics";
        auth_basic_user_file /etc/nginx/.htpasswd-metrics;
        proxy_pass http://node-exporter:9100/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }
}
