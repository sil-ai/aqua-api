name: branch-build

on:
  push:
    branches:
      - release

env:
  AWS_REGISTRY: 279795702643.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: aqua-api-aws

jobs:

  tests:
    name: Building and testing release branch image
    runs-on: ubuntu-latest
    env:
      MODAL_ENV: main
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Set up Python 3.11
      uses: actions/setup-python@v2
      with:
        python-version: 3.11

    - name: Install Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose
        docker-compose --version

    - name: Linting (Flake8 and isort)
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install isort
        isort --check .
        flake8 . --exclude='**/v1/**,**/v2/**,./venv,./alembic' --ignore=E501,W503,E203,E228,E226

    - name: Build API
      run: make build-actions
      env:
        REGISTRY: ${{ env.AWS_REGISTRY }}
        IMAGENAME: ${{ env.IMAGE_NAME }}

    - name: Test API
      env:
        OMIT_PREVIOUS_VERSIONS: true
        MODAL_WEBHOOK_TOKEN: ${{ secrets.MODAL_WEBHOOK_TOKEN }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        AIOHTTP_NO_EXTENSIONS: 1
        MODAL_ENV: main
      run: |
        pip install -r requirements.txt
        make test

  migrate:
    name: Apply Alembic migrations to production
    needs: [tests]
    runs-on: ubuntu-latest
    # Concurrency guard: only one migration job may run at a time per branch.
    # Prevents racing/overlapping migrations if multiple commits land quickly.
    concurrency:
      group: alembic-migrate-release
      cancel-in-progress: false
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Set up Python 3.11
      uses: actions/setup-python@v2
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Show current revision before migration
      env:
        AQUA_DB: ${{ secrets.PROD_AQUA_DB }}
      run: |
        cd alembic
        alembic current || true

    - name: Apply migrations to production
      env:
        AQUA_DB: ${{ secrets.PROD_AQUA_DB }}
      run: |
        cd alembic
        alembic upgrade head

    - name: Confirm migration head
      env:
        AQUA_DB: ${{ secrets.PROD_AQUA_DB }}
      run: |
        cd alembic
        alembic current

  push:
    name: Push image to ECR after successful migration
    needs: [migrate]
    runs-on: ubuntu-latest
    env:
      MODAL_ENV: main
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Build API
      run: make build-actions
      env:
        REGISTRY: ${{ env.AWS_REGISTRY }}
        IMAGENAME: ${{ env.IMAGE_NAME }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Push API
      run: make push-branch
      env:
        REGISTRY: ${{ secrets.AWS_REGISTRY }}
        IMAGENAME: ${{ env.IMAGE_NAME }}
        MODAL_ENV: main
