name: Claude Code Review

# Manual PR review with Claude. It does NOT run automatically on every PR.
# Trigger it either by:
#   - commenting "@claude" on a pull request, or
#   - running this workflow from the Actions tab (Run workflow) and passing a PR number.
# Requires the repository (or org) secret ANTHROPIC_API_KEY.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    name: Claude review
    runs-on: ubuntu-latest
    # Run only on a manual dispatch, or on an "@claude" comment that is on a PR.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.inputs.pr_number || github.event.issue.number || github.event.pull_request.number }}

            Review the pull request above for this repository.

            Apply the review criteria defined in .github/copilot-instructions.md.
            Prioritize, in order:
            1. Integrity — the changes are complete, correct, and safe
               (input validation, error handling, auth, no leaked secrets).
            2. Consistency — they follow the same patterns and conventions as
               the code that already exists in this repository.
            3. Sound design and SOLID principles.

            Use `gh pr diff <PR NUMBER>` and `gh pr view <PR NUMBER>` to inspect
            the change, then post concrete, actionable findings as inline PR
            review comments. Do not comment on formatting/style already enforced
            by linters.
          claude_args: |
            --max-turns 10
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
