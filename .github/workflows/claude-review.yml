name: Claude Code Review

# Manual PR review with Claude. It does NOT run automatically on every PR.
# Trigger it either by:
#   - commenting "@claude-reviewer" on a pull request, or
#   - running this workflow from the Actions tab (Run workflow) and passing a PR number.
# Requires the repository (or org) secret CLAUDE_CODE_OAUTH_TOKEN
# (generated with `claude setup-token` using a Claude Pro/Max subscription).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    name: Claude review
    runs-on: ubuntu-latest
    # Run only on a manual dispatch, or on an "@claude-reviewer" comment that is
    # on a PR. The `user.type != 'Bot'` guard stops the reviewer's own comments
    # (or any bot) from re-triggering the workflow in a loop.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && github.event.comment.user.type != 'Bot' && contains(github.event.comment.body, '@claude-reviewer')) ||
      (github.event_name == 'pull_request_review_comment' && github.event.comment.user.type != 'Bot' && contains(github.event.comment.body, '@claude-reviewer'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # On manual dispatch the default branch is checked out, not the PR, so
      # check out the PR head here. This gives Claude the changed code (for
      # accurate line numbers) without it needing any extra tool permission.
      - name: Checkout PR (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout ${{ github.event.inputs.pr_number }}

      - name: Review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude-reviewer"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.inputs.pr_number || github.event.issue.number || github.event.pull_request.number }}

            The PR branch is already checked out locally — read files directly
            for accurate line numbers, and use `gh pr diff <PR NUMBER>` /
            `gh pr view <PR NUMBER>` to inspect the change.

            Review the pull request above for this repository.
            Apply the review criteria defined in .github/copilot-instructions.md.
            Prioritize, in order:
            1. Integrity — the changes are complete, correct, and safe
               (input validation, error handling, auth, no leaked secrets).
            2. Consistency — they follow the same patterns and conventions as
               the code that already exists in this repository.
            3. Sound design and SOLID principles.

            Publish your findings ONLY as PR comments:
            - line-specific findings via the create_inline_comment tool, and
            - a short overall summary via `gh pr comment`.
            Do NOT use `gh api`, do NOT write files, and do NOT check out, push,
            merge or otherwise modify anything — commenting is the only action.
            Do not comment on formatting/style already enforced by linters.
          claude_args: |
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
