name: Claude Code Review

# Manual PR review with Claude. It does NOT run automatically on every PR.
# Trigger it either by:
#   - adding the "claude-review" label to a pull request, or
#   - running this workflow from the Actions tab (Run workflow) and passing a PR number.
# Requires the repository (or org) secret CLAUDE_CODE_OAUTH_TOKEN
# (generated with `claude setup-token` using a Claude Pro/Max subscription).
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    name: Claude review
    runs-on: ubuntu-latest
    # Run only on a manual dispatch, or when the "claude-review" label is added.
    # Triggering by label (not by comment) avoids re-triggering on the reviewer's
    # own comments and keeps the Actions list free of skipped runs.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'claude-review')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Check out the PR head so Claude sees the changed code (for accurate line
      # numbers) without needing any extra tool permission. Works for both the
      # label event and manual dispatch.
      - name: Checkout PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout ${{ github.event.inputs.pr_number || github.event.pull_request.number }}

      - name: Review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: "claude-review"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}

            The PR branch is already checked out locally — read files directly
            for accurate line numbers, and use `gh pr diff <PR NUMBER>` /
            `gh pr view <PR NUMBER>` to inspect the change.

            Review the pull request above for this repository.
            Apply the review criteria defined in .github/copilot-instructions.md.
            Prioritize, in order:
            1. Integrity — the changes are complete, correct, and safe
               (input validation, error handling, auth, no leaked secrets).
            2. Consistency — they follow the same patterns and conventions as
               the code that already exists in this repository.
            3. Sound design and SOLID principles.

            Publish your findings ONLY as PR comments:
            - line-specific findings via the create_inline_comment tool, and
            - a short overall summary via `gh pr comment`.
            Do NOT use `gh api`, do NOT write files, and do NOT check out, push,
            merge or otherwise modify anything — commenting is the only action.
            Do not comment on formatting/style already enforced by linters.
          claude_args: |
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
