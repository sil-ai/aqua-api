name: branch-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize main-branch deploys to prevent the `:latest` push race
# where a slower workflow built from an older SHA finishes after a
# faster newer one and regresses ECR. cancel-in-progress: true means
# a newer merge wins (its checkout already contains the older PR).
concurrency:
  group: main-build
  cancel-in-progress: true

env:
  AWS_REGISTRY: 279795702643.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: aqua-api-dev

jobs:

  tests:
    name: Building and pushing main branch images
    runs-on: ubuntu-latest
    env:
      MODAL_ENV: dev
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Set up Python 3.11
      uses: actions/setup-python@v2
      with:
        python-version: 3.11

    - name: Install uv
      run: pip install uv==0.9.21

    - name: Install Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose
        docker-compose --version

    - name: Linting (Black, Flake8 and isort)
      run: |
        uv sync --frozen
        . .venv/bin/activate
        make linting

    - name: Build API
      run: make build-actions
      env:
        REGISTRY: ${{ env.AWS_REGISTRY }}
        IMAGENAME: ${{ env.IMAGE_NAME }}

    - name: Smoke-test built image
      run: make smoke-test
      env:
        REGISTRY: ${{ env.AWS_REGISTRY }}
        IMAGENAME: ${{ env.IMAGE_NAME }}

    - name: Test API
      env:
        MODAL_WEBHOOK_TOKEN: ${{ secrets.MODAL_WEBHOOK_TOKEN }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        AIOHTTP_NO_EXTENSIONS: 1
        MODAL_ENV: dev
      run: |
        uv sync --frozen
        . .venv/bin/activate
        make test


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Push API
      run: make push-branch
      env:
        REGISTRY: ${{ secrets.AWS_REGISTRY }}
        IMAGENAME: ${{ env.IMAGE_NAME }}
        MODAL_ENV: dev
