version: '3'
services:
  api:
    build: .
    image: local/aqua-api:latest
    ports:
      - "8000:8000"
      - "5678:5678" # Expose the debug port
    # command: pytest -v
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=dbpassword
      - POSTGRES_DB=dbname
    ports:
      - "5432:5432"

