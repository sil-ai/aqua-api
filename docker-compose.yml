version: '3'
services:
  api:
    build: .
    image: local/aqua-api:latest
    ports:
      - "8000:8000"
      # Debugpy port (5678) intentionally not exposed. If you need it for
      # local debugging, add it via a docker-compose.override.yml.
    # command: pytest -v
    environment:
      - DATABASE_URL=postgresql+asyncpg://dbuser:dbpassword@db:5432/dbname
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - GRAPHQL_URL=${GRAPHQL_URL}
      - GRAPHQL_SECRET=${GRAPHQL_SECRET}
      - AQUA_DB=postgresql+asyncpg://dbuser:dbpassword@db:5432/dbname
      # DB connection pool tuning (defaults: pool_size=2, max_overflow=3,
      # timeout=10, recycle=1800). Set AQUA_DB_POOLCLASS=null to disable
      # pooling entirely (one connection per request).
      - AQUA_DB_POOLCLASS=${AQUA_DB_POOLCLASS:-}
      - AQUA_DB_POOL_SIZE=${AQUA_DB_POOL_SIZE:-}
      - AQUA_DB_MAX_OVERFLOW=${AQUA_DB_MAX_OVERFLOW:-}
      - AQUA_DB_POOL_TIMEOUT=${AQUA_DB_POOL_TIMEOUT:-}
      - AQUA_DB_POOL_RECYCLE=${AQUA_DB_POOL_RECYCLE:-}
      - TEST_KEY=${TEST_KEY}
      - FAIL_KEY=${FAIL_KEY}
      - KEY_VAULT=${KEY_VAULT}
      - MODAL_WEBHOOK_TOKEN=${MODAL_WEBHOOK_TOKEN}
      - SECRET_KEY=${SECRET_KEY}
      - MODAL_ENV=${MODAL_ENV}
      # Loki Configuration (Observability)
      - LOKI_ENABLED=${LOKI_ENABLED:-false}
      - LOKI_URL=${LOKI_URL}
      - LOKI_AUTH_TOKEN=${LOKI_AUTH_TOKEN:-}
      - PROJECT_NAME=aqua-api
      - ENVIRONMENT_LOKI=${ENVIRONMENT_LOKI:-docker}
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpassword
      POSTGRES_DB: dbname
    ports:
      - "5432:5432"
